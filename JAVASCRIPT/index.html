<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CineFind</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Roboto&display=swap" rel="stylesheet">
  <style>
    /* style.css */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Roboto', sans-serif;
}

body {
  background: #0d0d0d;
  color: #fff;
  min-height: 100vh;
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  background: #1a1a1a;
}

.logo {
  font-size: 1.5rem;
  font-family: 'Orbitron', sans-serif;
  color: #f5c518;
}

.profile {
  font-size: 1.2rem;
  cursor: pointer;
}

.hero {
  text-align: center;
  padding: 3rem 1rem;
  background: linear-gradient(to bottom, #1a1a1a, #0d0d0d);
}

.hero h1 {
  font-size: 2.5rem;
  margin-bottom: 1.5rem;
}

.search-box {
  display: inline-flex;
  border: 2px solid #f5c518;
  border-radius: 30px;
  overflow: hidden;
}

.search-box input {
  padding: 0.8rem 1rem;
  font-size: 1rem;
  border: none;
  outline: none;
  background: #1a1a1a;
  color: #fff;
  width: 300px;
}

.search-box button {
  background: #f5c518;
  border: none;
  padding: 0 1.2rem;
  font-size: 1.2rem;
  cursor: pointer;
}

.results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 1.5rem;
  padding: 2rem;
}

.movie-card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transition: transform 0.3s ease;
  cursor: pointer;
}

.movie-card:hover {
  transform: scale(1.05);
}

.movie-card img {
  width: 100%;
  display: block;
}

.movie-info {
  padding: 1rem;
}

.movie-info h3 {
  margin-bottom: 0.5rem;
  font-size: 1.1rem;
}

.movie-info p {
  font-size: 0.9rem;
  color: #f5c518;
}

  </style>
</head>
<body>
  <header>
    <div class="logo">🎬 CineFind</div>
    <div class="profile">👤</div>
  </header>

  <section class="hero">
    <h1>Find Your Next Movie</h1>
    <div class="search-box">
      <input type="text" placeholder="Search by title, actor, director...">
      <button>🔍</button>
    </div>
  </section>

  <section class="results">
    <!-- Sample Movie Cards -->
    <div class="movie-card">
      <img src="https://image.tmdb.org/t/p/w500/8Y43POKjjKDGI9MH89NW0NAzzp8.jpg" alt="Movie Poster">
      <div class="movie-info">
        <h3>Oppenheimer</h3>
        <p>2023 • 8.6 ★</p>
      </div>
    </div>

    <div class="movie-card">
      <img src="https://image.tmdb.org/t/p/w500/yF1eOkaYvwiORauRCPWznV9xVvi.jpg" alt="Movie Poster">
      <div class="movie-info">
        <h3>Dune: Part Two</h3>
        <p>2024 • 8.9 ★</p>
      </div>
    </div>

    <!-- Add more cards as needed -->
  </section>
</body>
</html>
